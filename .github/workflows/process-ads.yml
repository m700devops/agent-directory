name: Process Ad Submissions

on:
  schedule:
    - cron: '*/5 * * * *'  # Run every 5 minutes
  workflow_dispatch:  # Allow manual trigger

jobs:
  process-submissions:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm install node-fetch@2
      
    - name: Process submissions
      env:
        BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
        WALLET_ADDRESS: "0xD9f3caB9A103F76cEebe70513Ee6d2499B40a650"
      run: |
        cat > process-ads.js << 'EOFS'
        const fs = require('fs');
        const fetch = require('node-fetch');
        
        const WALLET = process.env.WALLET_ADDRESS;
        const API_KEY = process.env.BASESCAN_API_KEY;
        
        async function verifyTransaction(txHash) {
          try {
            // Check BaseScan for transaction
            const response = await fetch(
              `https://api.basescan.org/api?module=transaction&action=gettxreceiptstatus&txhash=${txHash}&apikey=${API_KEY}`
            );
            const data = await response.json();
            return data.status === '1' && data.message === 'OK';
          } catch (error) {
            console.error('Verification error:', error);
            return false;
          }
        }
        
        async function processSubmissions() {
          // Load files
          const submissions = JSON.parse(fs.readFileSync('submissions.json', 'utf8') || '{"pending": []}');
          const queue = JSON.parse(fs.readFileSync('queue.json', 'utf8'));
          const agents = JSON.parse(fs.readFileSync('agents.json', 'utf8'));
          
          console.log(`Processing ${submissions.pending.length} submissions...`);
          
          for (const sub of submissions.pending) {
            if (sub.status === 'verified') continue;
            
            // Verify payment
            const isValid = await verifyTransaction(sub.txHash);
            
            if (isValid) {
              sub.status = 'verified';
              sub.verifiedAt = new Date().toISOString();
              
              // Check if slots available
              if (queue.slots.available > 0) {
                // Add to active ads
                agents.ads.push({
                  id: `ad_${Date.now()}`,
                  agent: sub.agentName,
                  text: sub.adText,
                  link: sub.adLink,
                  position: 'sidebar',
                  txHash: sub.txHash,
                  createdAt: sub.timestamp
                });
                
                queue.slots.available--;
                queue.slots.active++;
                sub.status = 'active';
                
                console.log(`✅ Ad activated: ${sub.agentName}`);
              } else {
                // Add to queue
                queue.queue.push({
                  ...sub,
                  queuePosition: queue.queue.length + 1
                });
                
                console.log(`⏳ Ad queued: ${sub.agentName} (#${queue.queue.length})`);
              }
            } else {
              sub.status = 'failed';
              sub.error = 'Payment verification failed';
              console.log(`❌ Verification failed: ${sub.agentName}`);
            }
          }
          
          // Save files
          fs.writeFileSync('submissions.json', JSON.stringify(submissions, null, 2));
          fs.writeFileSync('queue.json', JSON.stringify(queue, null, 2));
          fs.writeFileSync('agents.json', JSON.stringify(agents, null, 2));
          
          console.log('Processing complete');
        }
        
        processSubmissions();
        EOFS
        
        node process-ads.js || echo "No submissions to process"
        
    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git diff --quiet && git diff --staged --quiet || git commit -m "Process ad submissions [automated]"
        
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref }}
